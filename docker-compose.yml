services:
  postgres:
    image: postgres:16
    container_name: notely-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: notely
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
    ports:
      - "5433:5432"
    volumes:
      - notely_postgres_data:/var/lib/postgresql/data

volumes:
  notely_postgres_data: